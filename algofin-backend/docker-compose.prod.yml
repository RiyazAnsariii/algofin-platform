# AlgoFin Backend — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   - No --reload on uvicorn (production ASGI workers)
#   - No port 5432/6379 exposed to host (only internal network)
#   - Gunicorn + uvicorn workers instead of uvicorn single process
#   - No volume mount for live code reload
#   - Resource limits on all services
#   - Nginx reverse proxy service included

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: algofin-postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - algofin-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: algofin-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - algofin-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M

  # ── FastAPI (production ASGI) ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: algofin-api:latest
    container_name: algofin-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:             postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:               ${SECRET_KEY}
      FERNET_KEY:               ${FERNET_KEY}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_DAYS:   ${JWT_REFRESH_EXPIRE_DAYS:-30}
      ENVIRONMENT:              production
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS}
      CELERY_BROKER_URL:        redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND:    redis://:${REDIS_PASSWORD}@redis:6379/2
      GEMINI_API_KEY:           ${GEMINI_API_KEY}
      GEMINI_MODEL:             ${GEMINI_MODEL:-gemini-2.0-flash}
    # Production: gunicorn with uvicorn workers (multi-process)
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --keepalive 5
      --access-logfile -
      --error-logfile -
    networks:
      - algofin-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery worker ─────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: algofin-api:latest
    container_name: algofin-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:            ${SECRET_KEY}
      FERNET_KEY:            ${FERNET_KEY}
      ENVIRONMENT:           production
      CELERY_BROKER_URL:     redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      GEMINI_API_KEY:        ${GEMINI_API_KEY}
      GEMINI_MODEL:          ${GEMINI_MODEL:-gemini-2.0-flash}
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4 -Q default,sync
    networks:
      - algofin-internal
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Celery beat ───────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: algofin-api:latest
    container_name: algofin-beat
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:            ${SECRET_KEY}
      FERNET_KEY:            ${FERNET_KEY}
      ENVIRONMENT:           production
      CELERY_BROKER_URL:     redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    command: celery -A app.workers.celery_app beat --loglevel=warning
    networks:
      - algofin-internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Nginx reverse proxy ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: algofin-nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/algofin.conf:/etc/nginx/conf.d/algofin.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - algofin-internal
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  algofin-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

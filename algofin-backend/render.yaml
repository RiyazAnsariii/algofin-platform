# render.yaml — Render.com free-tier deployment config for AlgoFin backend
# Docs: https://render.com/docs/render-yaml-spec
#
# NOTE: Render discontinued their free PostgreSQL tier.
# Database is hosted on Neon (https://neon.tech) — free, no credit card.
# Set DATABASE_URL manually from the Neon dashboard (see DEPLOYMENT.md).

services:
  - type: web
    name: algofin-api
    runtime: python
    repo: https://github.com/RiyazAnsariii/algofin-platform
    branch: main
    rootDir: algofin-backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -m alembic upgrade head &&
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
    healthCheckPath: /health
    plan: free

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false          # Set from Neon dashboard — see DEPLOYMENT.md Step 2
      - key: REDIS_URL
        sync: false          # Set from Upstash dashboard — see DEPLOYMENT.md Step 3
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: FERNET_KEY
        sync: false          # Must be a valid Fernet base64 key — see DEPLOYMENT.md
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL after deploy
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "30"
      - key: CELERY_BROKER_URL
        sync: false          # SAME value as REDIS_URL — Upstash does NOT support /1, /2 db indices
      - key: CELERY_RESULT_BACKEND
        sync: false          # SAME value as REDIS_URL — Upstash does NOT support /1, /2 db indices
      - key: GEMINI_FALLBACK_MODELS
        value: "gemini-flash-lite-latest,gemini-2.0-flash-lite-001"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false          # https://<your-render-url>/api/v1/auth/google/callback

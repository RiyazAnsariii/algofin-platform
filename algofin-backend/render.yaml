# render.yaml — Render.com free-tier deployment config for AlgoFin backend
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: algofin-api
    runtime: python
    repo: https://github.com/RiyazAnsariii/algofin-platform
    branch: main
    rootDir: algofin-backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -m alembic upgrade head &&
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
    healthCheckPath: /health
    plan: free

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: algofin-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "30"
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

databases:
  - name: algofin-db
    databaseName: algofin
    user: algofin
    plan: free

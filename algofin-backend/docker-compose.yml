# AlgoFin Backend
# FastAPI + PostgreSQL + Redis + Celery
# Binance USDT-M Futures trading dashboard backend

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: algofin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-algofin}
      POSTGRES_USER:     ${POSTGRES_USER:-algofin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algofin_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algofin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: algofin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-algofin_redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-algofin_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algofin-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql+asyncpg://${POSTGRES_USER:-algofin}:${POSTGRES_PASSWORD:-algofin_dev_password}@postgres:5432/${POSTGRES_DB:-algofin}
      REDIS_URL:            redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/0
      SECRET_KEY:           ${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
      FERNET_KEY:           ${FERNET_KEY:-}
      JWT_ACCESS_EXPIRE_MINUTES:  ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_DAYS:    ${JWT_REFRESH_EXPIRE_DAYS:-30}
      ENVIRONMENT:          ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS:      ${ALLOWED_ORIGINS:-http://localhost:3000}
      CELERY_BROKER_URL:    redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/2
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      GEMINI_MODEL:         ${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery worker (sync engine) ──────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algofin-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql+asyncpg://${POSTGRES_USER:-algofin}:${POSTGRES_PASSWORD:-algofin_dev_password}@postgres:5432/${POSTGRES_DB:-algofin}
      REDIS_URL:            redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/0
      SECRET_KEY:           ${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
      FERNET_KEY:           ${FERNET_KEY:-}
      ENVIRONMENT:          ${ENVIRONMENT:-development}
      CELERY_BROKER_URL:    redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/2
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      GEMINI_MODEL:         ${GEMINI_MODEL:-gemini-2.0-flash}
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,sync

  # ── Celery beat (scheduler) ──────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algofin-beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql+asyncpg://${POSTGRES_USER:-algofin}:${POSTGRES_PASSWORD:-algofin_dev_password}@postgres:5432/${POSTGRES_DB:-algofin}
      REDIS_URL:            redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/0
      SECRET_KEY:           ${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
      FERNET_KEY:           ${FERNET_KEY:-}
      ENVIRONMENT:          ${ENVIRONMENT:-development}
      CELERY_BROKER_URL:    redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-algofin_redis_dev}@redis:6379/2
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

volumes:
  postgres_data:
  redis_data:

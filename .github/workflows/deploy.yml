name: AlgoFin CI/CD — Vercel + Render

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Backend lint + type check ──────────────────────────────────
  backend-check:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: algofin-backend/requirements.txt

      - name: Install deps
        working-directory: algofin-backend
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        working-directory: algofin-backend
        run: ruff check app/ --select E,W,F --ignore E501

  # ── 2. Frontend type check + build ────────────────────────────────
  frontend-check:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: algofin-platform/package-lock.json

      - name: Install deps
        working-directory: algofin-platform
        run: npm ci

      - name: TypeScript check
        working-directory: algofin-platform
        run: npx tsc --noEmit

      - name: Build
        working-directory: algofin-platform
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://algofin-api.onrender.com

  # ── 3. Deploy frontend to Vercel (main branch only) ───────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: algofin-platform/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        working-directory: algofin-platform
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Trigger Render redeploy (main branch only) ─────────────────
  deploy-backend:
    name: Redeploy backend → Render
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # RENDER_DEPLOY_HOOK_URL is set in GitHub Secrets
        # Get it from: Render Dashboard → algofin-api → Settings → Deploy Hooks
